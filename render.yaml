# Blueprint de Render: configura el Web Service automáticamente.
# En Render: New + -> Blueprint -> elegí este repo.
services:
  - type: web
    name: grabadora-ia
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      # La API key se carga a mano en el panel de Render (NO se versiona).
      - key: ANTHROPIC_API_KEY
        sync: false
      # Modelo más económico (Haiku). Editable desde el panel si querés.
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      # Transcripción con Groq/Whisper (free tier). Key a mano en el panel.
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: whisper-large-v3-turbo
      # Vacío = autodetectar idioma. NO poner "es" (rompe audio en otro idioma).
      - key: TRANSCRIBE_LANG
        value: ""
      # Render genera una clave secreta segura solo.
      - key: FLASK_SECRET_KEY
        generateValue: true
      # Contraseña de acceso a la app (cargala a mano en el panel de Render).
      - key: APP_PASSWORD
        sync: false
      # Versión de Python a usar en el deploy.
      - key: PYTHON_VERSION
        value: "3.12.10"
